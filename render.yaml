# Deployment (Render)
#
# Free plan: PANEL_SCRAPE_ENABLED=0 — scrape locally, panel reads Postgres.
# Do NOT set start command to scripts/panel_server.py (binds localhost in dev).
# Docker services use docker-entrypoint.sh → gunicorn on 0.0.0.0:$PORT

services:
  - type: web
    name: relocation-jobs
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerCommand: ./docker-entrypoint.sh
    healthCheckPath: /api/auth/status
    envVars:
      - key: PANEL_DATA_DIR
        value: /tmp/panel-data
      - key: PANEL_SCRAPE_ENABLED
        value: "0"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PANEL_SECRET_KEY
        generateValue: true
      - key: PANEL_ADMIN_USER
        value: admin
      - key: PANEL_ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PANEL_ALLOW_REGISTER
        value: "0"
