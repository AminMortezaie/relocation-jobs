[pytest]
testpaths = tests
pythonpath = .
addopts = -ra --strict-markers
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    integration: tests that exercise multiple layers (DB + API)
    network: tests that mock or require HTTP (never hit live ATS in CI)

[coverage:run]
source = relocation_jobs

[coverage:report]
fail_under = 95
show_missing = True
