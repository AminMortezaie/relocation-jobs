[pytest]
testpaths = tests
pythonpath = .
addopts = -ra --strict-markers -m "not scrape" -n auto
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    integration: tests that exercise multiple layers (DB + API)
    network: tests that mock or require HTTP (never hit live ATS in CI)
    scrape: ATS/scraper tests — run with pytest -m scrape when touching scrape_jobs.py
    fresh_db: test needs empty database (no session admin seed)

[coverage:run]
source = relocation_jobs
omit =
    relocation_jobs/scrape_jobs.py
    relocation_jobs/build_companies.py

[coverage:report]
fail_under = 90
show_missing = True
