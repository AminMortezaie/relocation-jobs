name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Business tests
        run: pytest -o addopts="-ra --strict-markers -m 'not scrape'"

      - name: Coverage gate
        run: pytest --cov --cov-report=term-missing -o addopts="-ra --strict-markers -m 'not scrape'"
